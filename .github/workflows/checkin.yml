name: Daily Check-in

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install .

      - name: Run check-in
        run: python checkin.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
